spring.application.name=user-service

server.port=8081
server.servlet.context-path=/api

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:nutrimind_user}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.yxw.user.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}

app.jwt.secret=${APP_JWT_SECRET:zhishifenzi-jwt-secret-key-2026-dev-32chars}
app.jwt.expire=${APP_JWT_EXPIRE:86400000}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtps}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.timeout=10000

app.verification.email.enabled=${APP_EMAIL_VERIFICATION_ENABLED:false}
app.verification.email.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.verification.email.subject=${APP_EMAIL_VERIFICATION_SUBJECT:NutriMind verification code}
app.verification.email.expire-seconds=${APP_EMAIL_VERIFICATION_EXPIRE_SECONDS:300}
app.verification.email.cooldown-seconds=${APP_EMAIL_VERIFICATION_COOLDOWN_SECONDS:60}
