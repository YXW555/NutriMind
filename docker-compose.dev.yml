services:
  mysql:
    image: mysql:8.4
    container_name: nutrimind-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before running docker compose}"
    ports:
      - "${MYSQL_DOCKER_PORT:-3307}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.4
    container_name: nutrimind-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: nutrimind-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - milvus-etcd-data:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: nutrimind-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - milvus-minio-data:/minio_data

  milvus-standalone:
    image: milvusdb/milvus:v2.6.0
    container_name: nutrimind-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    depends_on:
      - milvus-etcd
      - milvus-minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus

  nacos:
    image: nacos/nacos-server:v3.1.0
    container_name: nutrimind-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "${NACOS_AUTH_TOKEN:-bmFjb3MtbG9jYWwtZGV2LXRva2VuLXBsZWFzZS1jaGFuZ2U=}"
      NACOS_AUTH_IDENTITY_KEY: "${NACOS_AUTH_IDENTITY_KEY:-serverIdentity}"
      NACOS_AUTH_IDENTITY_VALUE: "${NACOS_AUTH_IDENTITY_VALUE:-security}"
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"

volumes:
  mysql-data:
  redis-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
