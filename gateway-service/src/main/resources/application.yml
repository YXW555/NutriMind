server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - "*"
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: user-service-auth
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/auth/**,/api/profile/**,/api/test/**
            - id: food-service
              uri: ${FOOD_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/foods/**
            - id: ai-service
              uri: ${AI_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/vision/**
            - id: meal-service
              uri: ${MEAL_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/meals/**,/api/reports/**,/api/advisor/**,/api/community/**,/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
