spring.application.name=food-service

server.port=8082
server.servlet.context-path=/api

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_FOOD_DB:nutrimind_food}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}

app.bootstrap.sample-foods-enabled=${APP_BOOTSTRAP_SAMPLE_FOODS_ENABLED:true}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expire=${APP_JWT_EXPIRE:86400000}
