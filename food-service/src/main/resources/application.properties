spring.application.name=food-service

server.port=8082
server.servlet.context-path=/api

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_FOOD_DB:nutrimind_food}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}

app.bootstrap.sample-foods-enabled=${APP_BOOTSTRAP_SAMPLE_FOODS_ENABLED:true}
app.bootstrap.food-metadata-enabled=${APP_BOOTSTRAP_FOOD_METADATA_ENABLED:true}
app.bootstrap.food-graph-enabled=${APP_BOOTSTRAP_FOOD_GRAPH_ENABLED:true}
app.bootstrap.food-concept-bank-path=${APP_BOOTSTRAP_FOOD_CONCEPT_BANK_PATH:}
app.graph.neo4j.enabled=${APP_GRAPH_NEO4J_ENABLED:false}
app.graph.neo4j.uri=${APP_GRAPH_NEO4J_URI:bolt://localhost:7687}
app.graph.neo4j.username=${APP_GRAPH_NEO4J_USERNAME:neo4j}
app.graph.neo4j.password=${APP_GRAPH_NEO4J_PASSWORD:neo4j-local-dev-password}
app.graph.neo4j.database=${APP_GRAPH_NEO4J_DATABASE:neo4j}
app.graph.neo4j.sync-on-startup=${APP_GRAPH_NEO4J_SYNC_ON_STARTUP:true}
app.jwt.secret=${APP_JWT_SECRET:zhishifenzi-jwt-secret-key-2026-dev-32chars}
app.jwt.expire=${APP_JWT_EXPIRE:86400000}
