spring.application.name=ai-service

server.port=8084
server.servlet.context-path=/api

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}

food.service.base-url=${FOOD_SERVICE_BASE_URL:http://localhost:8082/api}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expire=${APP_JWT_EXPIRE:86400000}
app.vision.engine=${APP_VISION_ENGINE:python}
app.vision.default-top-k=${APP_VISION_DEFAULT_TOP_K:4}
app.vision.max-top-k=${APP_VISION_MAX_TOP_K:5}
app.vision.python.base-url=${APP_VISION_PYTHON_BASE_URL:http://localhost:8091}
app.vision.python.predict-path=${APP_VISION_PYTHON_PREDICT_PATH:/predict}

management.endpoints.web.exposure.include=health,info
