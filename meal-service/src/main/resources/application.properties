spring.application.name=meal-service

server.port=8083
server.servlet.context-path=/api

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_MEAL_DB:nutrimind_meal}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD}
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.discovery.enabled=${NACOS_DISCOVERY_ENABLED:false}

app.bootstrap.sample-community-enabled=${APP_BOOTSTRAP_SAMPLE_COMMUNITY_ENABLED:true}
app.community.upload-dir=${APP_COMMUNITY_UPLOAD_DIR:./.run-logs/community-images}
food.service.base-url=${FOOD_SERVICE_BASE_URL:http://localhost:8082/api}
user.service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8081/api}
app.rag.enabled=${APP_RAG_ENABLED:true}
app.rag.top-k=${APP_RAG_TOP_K:4}
app.rag.bootstrap-on-startup=${APP_RAG_BOOTSTRAP_ON_STARTUP:true}
app.rag.milvus.enabled=${APP_RAG_MILVUS_ENABLED:true}
app.rag.milvus.uri=${APP_RAG_MILVUS_URI:http://localhost:19530}
app.rag.milvus.collection-name=${APP_RAG_MILVUS_COLLECTION_NAME:nutrimind_advisor_knowledge}
app.rag.milvus.primary-field=${APP_RAG_MILVUS_PRIMARY_FIELD:chunk_id}
app.rag.milvus.vector-field=${APP_RAG_MILVUS_VECTOR_FIELD:embedding}
app.rag.milvus.metric-type=${APP_RAG_MILVUS_METRIC_TYPE:COSINE}
app.rag.milvus.recreate-on-startup=${APP_RAG_MILVUS_RECREATE_ON_STARTUP:false}
app.rag.qwen.enabled=${APP_RAG_QWEN_ENABLED:true}
app.rag.qwen.api-key=${APP_RAG_QWEN_API_KEY:}
app.rag.qwen.base-url=${APP_RAG_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
app.rag.qwen.chat-model=${APP_RAG_QWEN_CHAT_MODEL:qwen-plus}
app.rag.qwen.embedding-model=${APP_RAG_QWEN_EMBEDDING_MODEL:text-embedding-v4}
app.rag.qwen.embedding-dimension=${APP_RAG_QWEN_EMBEDDING_DIMENSION:1024}
app.rag.qwen.embedding-batch-size=${APP_RAG_QWEN_EMBEDDING_BATCH_SIZE:8}
app.rag.qwen.temperature=${APP_RAG_QWEN_TEMPERATURE:0.3}
app.jwt.secret=${APP_JWT_SECRET:zhishifenzi-jwt-secret-key-2026-dev-32chars}
app.jwt.expire=${APP_JWT_EXPIRE:86400000}
